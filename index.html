<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site Moderno</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="header">
        <h1>Meu Site Moderno 🚀</h1>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <nav>
                <ul>
                    <li class="menu-title">Menu</li>
                    <li><i class="fas fa-home"></i> Início</li>
                    <li><i class="fas fa-user"></i> Sobre</li>
                    <li><i class="fas fa-briefcase"></i> Serviços</li>
                    <li><i class="fas fa-phone"></i> Contato</li>
                </ul>
            </nav>
        </aside>

        <main class="content">
            <section class="card">
                <h2>Bem-vindo!</h2>
                <hr>
                <p>Esse é um layout moderno utilizando Flexbox.</p>
                <p>Agora com visual mais bonito, sombras e cores agradáveis.</p>
            </section>
        </main>
    </div>

    <footer class="footer">
        <p>&copy; 2026 - Meu Site</p>
    </footer>

</body>
</html>
